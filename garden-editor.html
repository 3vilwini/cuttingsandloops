<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>୨ৎ cuttings જ⁀➴ loops ༄</title>
<style>
  @font-face{
    font-family: "Deer Diary";
    src: url("fonts/deer-diary.ttf") format("truetype");
    font-display: swap;
  }
  :root{
    --ink:#000; --paper:#fff; --muted:#555;
  }
  *{ box-sizing:border-box; }
  html, body{ height:100%; }
  body{
    margin:0; color:var(--ink);
    font-family: "Deer Diary", "Courier New", monospace;
    font-size:.65rem;                          /* single size for all text on the page — matches the builder panel */
    display:flex; align-items:center; justify-content:center; padding:2.5rem;
    position:relative; overflow:hidden;
  }

  /* ---- nav stack (top-left, always on top) ---- */
  .navstack{ position:fixed; top:2.5rem; left:2.5rem; z-index:3; display:flex; flex-direction:column; gap:.6rem; }
  /* plain squares, each with its own full black border — not stuck together,
     since each group only ever holds one button now */
  .navgroup{ display:flex; flex-direction:column; width:2.3rem; }
  .navbtn{
    width:2.3rem; height:2.3rem; border:1px solid #000;
    background:var(--paper); color:var(--ink); padding:0;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-family:inherit; font-size:inherit; text-align:center;
    /* without this the browser's native button chrome (a subtle bezel/
       shadow baked into appearance:auto) shows through on top of our own
       border, especially on :active — doubled-up stroke + a shadow
       that was never actually in our CSS */
    appearance:none; -webkit-appearance:none; outline:none; box-shadow:none;
  }
  .navbtn:active{ background:#000; color:var(--paper); }
  #navToggleBtn{ font-size:1.6rem; }
  #seedListToggleBtn{ font-size:1.6rem; }
  /* pressed-looking while the panel it toggles is open, so it's obvious
     this same button is what closes it again */
  .navbtn[data-open="true"]{ background:#000; color:var(--paper); }

  /* ---- chosen weather tags (top-center, mirrors the picker in the card) ----
     clickable — see pressTag/checkTagPresses: two different people clicking
     the same one within a couple seconds sends everyone to another page. */
  .tagdisplay{
    position:fixed; top:2.5rem; left:50%; transform:translateX(-50%); z-index:3;
    display:flex; gap:.5rem;
  }
  .tagdisplay span{
    display:inline-block; border:1px solid #000; border-radius:999px; background:var(--paper); color:var(--ink);
    padding:.5rem .9rem; font-family:inherit; font-size:inherit; cursor:pointer;
  }
  .tagdisplay span:hover{ box-shadow: 0 0 10px 3px var(--glow, transparent); }

  /* ---- live visitor count (top-right) ---- */
  .visitorcount{
    position:fixed; top:2.5rem; right:2.5rem; z-index:3;
    display:flex; align-items:center; gap:.5rem;
    border:1px solid #000; background:var(--paper); color:var(--ink); padding:.5rem .8rem;
  }
  .visitorcount .dot{ width:8px; height:8px; border-radius:50%; background:#3ab704; flex-shrink:0; }

  /* ---- arrow-key pad (bottom-right, perfect squares, gap kept between them) ---- */
  .arrowpad{
    position:fixed; bottom:2.5rem; right:2.5rem; z-index:3;
    display:grid; grid-template-columns:repeat(3, 2.3rem); grid-template-rows:repeat(2, 2.3rem);
    gap:.3rem;
  }
  .arrowpad button{
    grid-column:2; width:2.3rem; height:2.3rem; border:1px solid #000; background:var(--paper); color:var(--ink);
    display:flex; align-items:center; justify-content:center; padding:0;
    cursor:pointer; font-family:inherit; font-size:inherit;
  }
  .arrowpad button:active{ background:#000; color:var(--paper); }
  .arrowpad #panUp{ grid-row:1; }
  .arrowpad #panLeft{ grid-row:2; grid-column:1; }
  .arrowpad #panDown{ grid-row:2; grid-column:2; }
  .arrowpad #panRight{ grid-row:2; grid-column:3; }

  /* ---- the pannable field: bigger than the viewport, arrow keys / pad scroll it ---- */
  #viewport{ position:fixed; inset:0; z-index:0; overflow:auto; }
  #field{ position:relative; }
  #patternLayer{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

  /* seed slots — fixed positions on a pattern-specific grid (never move once
     the pattern is set). An empty one is a "+ add seed" invitation; a
     filled one shows its title/artist and previews on hover, like a plant.
     Same pointer-events split as #plantSlots: the full-field container must
     not capture clicks itself (it would win hit-tests over anything drawn
     later, like a plant's overflowing label, everywhere it isn't actually
     covering an actual seed) — each .seedslot re-enables it individually. */
  #seedSlots{ position:absolute; inset:0; pointer-events:none; }
  /* the dot is the real anchor — sized+centered on its own, so toggling the
     label's visibility never shifts a seed's actual planted position. */
  .seedslot{ position:absolute; width:10px; height:10px; transform:translate(-50%,-50%); pointer-events:auto; cursor:pointer; }
  /* glows the dot + label together as one shape, in the garden's seed
     color — drop-shadow (not box-shadow) so it follows the label's actual
     text/gradient silhouette instead of a rectangular box around it */
  .seedslot:hover{ filter: drop-shadow(0 0 6px var(--glow, transparent)); }
  .seedslot .dot{ position:absolute; inset:0; border-radius:50%; border:1px solid #000; }
  .seedslot .txt{ position:absolute; left:14px; top:50%; transform:translateY(-50%); white-space:nowrap; }
  /* empty seeds invite a click: the "+ add seed" text pulses in size while
     its own gradient fill (seed color <-> white) slides through it — both
     stop the instant a seed is added, since only .empty gets these. */
  @keyframes seedTextPulse{ 0%,100%{ transform:translateY(-50%) scale(1); } 50%{ transform:translateY(-50%) scale(1.1); } }
  @keyframes seedGradientPulse{ 0%{ background-position:0% 50%; } 100%{ background-position:200% 50%; } }
  .seedslot.empty .txt{
    background:linear-gradient(90deg, var(--text-color,#fff) 0%, var(--soil-color,#fff) 50%, var(--text-color,#fff) 100%);
    background-size:200% 100%;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation: seedTextPulse 1.6s ease-in-out infinite, seedGradientPulse 2.4s linear infinite;
  }

  /* the layer itself must not capture pointer events — it's the full size
     of the field, and would otherwise sit on top of everything (including
     the seed slots underneath) and swallow clicks even where there's no
     actual plant. Each .plantmark re-enables pointer-events on itself. */
  #plantSlots{ position:absolute; inset:0; pointer-events:none; }

  /* dashed curved lines from every seed to the plants sampled from it —
     shown/hidden by the "roots" toggle, see applyViewToggles/renderConnections */
  #connectionsLayer{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

  /* a plant is its own freehand drawing on the map — no square/border
     around it, just the strokes themselves, at the exact same scale they
     were drawn at in the modal. width/height here must match pCanvas's
     width/height attribute (140x140) 1:1, so the viewBox maps directly to
     screen pixels with no scaling — vector-effect:non-scaling-stroke on
     each polyline is just a safety net in case that ever changes. */
  .plantmark{
    position:absolute; width:140px; height:140px; transform:translate(-50%,-50%);
    cursor:grab; pointer-events:auto;
  }
  .plantmark:active{ cursor:grabbing; }
  .plantmark svg{ width:100%; height:100%; overflow:visible; }
  /* a small dot in the plant's own color, right before its name — same
     visual language as a seed's dot. Stays visible even when the "labels"
     toggle hides the name text next to it, same as a seed's dot does. */
  .plantmark .labeldot{
    position:absolute; top:50%; left:100%; transform:translateY(-50%);
    margin-left:.4rem; width:10px; height:10px; border-radius:50%; border:1px solid #000;
  }
  @keyframes plantPinPulse{ 0%,100%{ transform:translateY(-50%) scale(1); } 50%{ transform:translateY(-50%) scale(1.6); } }
  .plantmark.pinned .labeldot{ animation:plantPinPulse 1s ease-in-out infinite; }
  /* the plant's name, shown/hidden together with the seed labels via the
     same "labels" toggle — stroked so it stays readable over any field
     background or drawing color underneath it */
  .plantmark .txt{
    position:absolute; top:50%; left:100%; transform:translateY(-50%);
    margin-left:calc(.4rem + 10px + .35rem); white-space:nowrap; pointer-events:none;
  }
  /* fallback for a plant saved with an empty canvas — nothing was drawn,
     so there's no path data to show */
  .plantmark .fallback{
    position:absolute; inset:0; border:2px solid #000;
  }
  /* recipe screenshot — only added to the DOM while actually hovering (see
     mouseenter/mouseleave), sat above the marker like a tooltip */
  .plantmark .recipepreview{
    position:absolute; left:50%; bottom:100%; transform:translateX(-50%);
    margin-bottom:.4rem; max-width:140px; max-height:140px;
    border:2px solid #000; background:var(--paper); pointer-events:none;
  }
  /* shown only when hovering a plantable hot spot (see nearestHotSpot) —
     border color is set inline to the garden's current seed color. Sized to
     match .plantmark/pCanvas (140x140) exactly, and nearestHotSpot's hit
     test uses that same 140x140 box, so the square appears/disappears
     right at its own visible edge instead of some smaller invisible area. */
  .hoversquare{
    position:absolute; width:140px; height:140px; border:1px solid #000;
    transform:translate(-50%,-50%); pointer-events:none; display:none;
  }

  /* ---- bottom toggle bar: label, then pill switch, black/white (inverted vs before) ---- */
  .viewtoggles{
    position:fixed; bottom:2.5rem; left:2.5rem; z-index:3;
    display:flex; gap:2.2rem; align-items:center;
  }
  /* tablet and narrower: stack the toggles vertically instead of running
     them in a row, since a 4-wide row starts crowding a narrower viewport */
  @media (max-width:768px){
    .viewtoggles{ flex-direction:column; align-items:flex-start; gap:.6rem; }
  }
  .toggle{
    display:flex; align-items:center; gap:.5rem; border:none; background:none;
    cursor:pointer; font-family:inherit; font-size:inherit; color:var(--ink); padding:0;
  }
  .toggle .switch{
    position:relative; width:26px; height:14px; border-radius:999px;
    border:1px solid #000; background:#000; flex-shrink:0;
  }
  .toggle .knob{ position:absolute; top:1px; left:1px; width:10px; height:10px; border-radius:50%; background:var(--paper); }
  .toggle[data-on="true"] .switch{ background:var(--paper); }
  .toggle[data-on="true"] .knob{ left:13px; background:#000; }

  /* ---- vintage mac window chrome ---- */
  /* opens right next to the swirl nav button that toggles it, top-aligned
     with that same button — not centered on the page */
  .card{
    position:fixed; top:2.5rem; left:calc(2.5rem + 2.3rem + .6rem); z-index:2;
    width:100%; max-width:250px; background:var(--paper); color:var(--ink);
    border:2px solid #000; border-radius:0;
  }
  /* docks under the swirl button's own panel, next to the seed-list nav
     icon right below it — same left offset, shifted down to that row */
  #seedListCard{ top:calc(2.5rem + 2.3rem + .6rem); max-width:220px; }
  #seedListItems{ display:flex; flex-direction:column; gap:.5rem; max-height:220px; overflow-y:auto; }
  .seedlistitem{
    display:flex; align-items:center; justify-content:space-between; gap:.5rem;
    border:1px solid #000; padding:.4rem .5rem;
  }
  .seedlistitem span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .seedlistitem a{ color:var(--ink); flex-shrink:0; }
  .seedlistdelete{
    border:none; background:none; padding:0; margin:0; flex-shrink:0;
    cursor:pointer; font-size:inherit; line-height:1;
  }
  .titlebar{
    height:18px; border-bottom:2px solid #000; display:flex; align-items:center; gap:.4rem; padding:0 6px;
    background-image: repeating-linear-gradient(#000 0 1px, transparent 1px 3px);
  }
  .titlebar .closebox{ width:9px; height:9px; border:1px solid #000; background:var(--paper); flex-shrink:0; }
  .cardbody{ padding:.8rem .9rem; }

  .sub{ color:var(--muted); margin:0 0 1.6rem; line-height:1.4; }
  label{ display:block; color:var(--muted); margin-bottom:.3rem; }
  .row{ margin-bottom:.8rem; }
  input[type="text"], select{
    width:100%; padding:.4rem .5rem; border-radius:0; border:1px solid #000;
    background:var(--paper); color:var(--ink); font-family:inherit; font-size:inherit;
  }

  /* tags */
  .tagbank{ display:flex; flex-wrap:wrap; gap:.3rem; margin-bottom:.5rem; }
  .tag{
    padding:.2rem .55rem; border-radius:999px; border:1px solid #000;
    background:var(--paper); color:var(--ink); font-family:inherit; font-size:inherit; cursor:pointer;
  }
  .tag[data-selected="true"]{ background:#000; color:var(--paper); }
  .tag:disabled{ opacity:.35; cursor:not-allowed; }
  .tagcustom{ display:flex; gap:.4rem; align-items:stretch; }
  .tagcustom input{ flex:1; }
  .tagcustom button{
    padding:.4rem .7rem; border-radius:999px; border:1px solid #000; background:var(--paper); color:var(--ink);
    font-family:inherit; font-size:inherit; cursor:pointer;
  }

  /* colors — one per row, keeps the whole panel narrow and tall */
  .colorgrid{ display:grid; grid-template-columns:1fr; gap:.5rem; }
  .colorpick span{ color:var(--muted); }
  .colorpick{ display:flex; flex-direction:column; align-items:flex-start; gap:.25rem; }
  .colorpick input[type="color"]{
    width:100%; height:24px; border:1px solid #000; border-radius:0; background:none; padding:2px; cursor:pointer;
  }

  /* pattern picker */
  .patternbank{ display:flex; gap:.35rem; margin-bottom:.7rem; }
  .patternbtn{
    flex:1; padding:.4rem .3rem; border:1px solid #000; background:var(--paper); color:var(--ink);
    font-family:inherit; font-size:inherit; cursor:pointer; text-align:center; border-radius:0;
  }
  .patternbtn[data-selected="true"]{ background:#000; color:var(--paper); }

  /* scale slider */
  .scalerow{ display:flex; align-items:center; gap:.5rem; }
  .scalerow input[type="range"]{ flex:1; accent-color:#000; }
  .scalerow span{ color:var(--muted); width:2.4rem; text-align:right; }

  .actions{ display:flex; justify-content:flex-end; gap:.5rem; margin-top:1rem; }
  button.primary{
    padding:.45rem 1rem; border-radius:999px; border:1px solid #000; background:#000; color:var(--paper);
    font-family:inherit; font-size:inherit; cursor:pointer; font-weight:600;
  }
  button.primary:active{ background:var(--paper); color:#000; }
  button.primary:disabled{ opacity:.35; cursor:not-allowed; }

  /* modal (seed uploader) */
  .scrim{
    display:none; position:fixed; inset:0;
    align-items:center; justify-content:center; padding:1.5rem; z-index:2;
  }
  .scrim.open{ display:flex; }
  .modal{
    width:100%; max-width:680px; max-height:85vh; overflow:auto;
    background:var(--paper); color:var(--ink); border:2px solid #000; border-radius:0;
  }
  .modal .cardbody{ padding:1.6rem; }
  .modal h2{ margin:0 0 .2rem; font-size:inherit; }
  .modal .sub{ margin-bottom:1.2rem; }

  .modal .actions{ margin-top:1.5rem; justify-content:flex-end; }
  button.ghost{
    background:none; border:1px solid #000; color:var(--ink); border-radius:999px;
    padding:.3rem .8rem; cursor:pointer; font-size:inherit; font-family:inherit;
  }
  button.ghost:disabled{ opacity:.35; cursor:not-allowed; }

  /* ---- add-plant modal ---- */
  .filelabel{
    display:flex; align-items:center; gap:.5rem; padding:.5rem .7rem;
    border:1px dashed #000; cursor:pointer; font-size:inherit; color:var(--muted); margin-bottom:.2rem;
  }
  .filelabel input{ display:none; }
  .filelabel.has-file{ color:#000; font-weight:600; }
  #pCanvas{ border:2px solid #000; cursor:crosshair; touch-action:none; background:var(--paper); }
</style>
</head>
<body>

<div id="viewport">
  <div id="field">
    <svg id="patternLayer" aria-hidden="true"></svg>
    <div id="seedSlots" aria-hidden="true"></div>
    <div id="plantSlots" aria-hidden="true"></div>
    <svg id="connectionsLayer" aria-hidden="true"></svg>
    <div id="hoverSquare" class="hoversquare" aria-hidden="true"></div>
  </div>
</div>

<div class="navstack">
  <div class="navgroup">
    <button type="button" class="navbtn" id="navToggleBtn" title="open/close">𖦹</button>
  </div>
  <div class="navgroup">
    <button type="button" class="navbtn" id="seedListToggleBtn" title="seed list">❦</button>
  </div>
</div>

<div class="tagdisplay" id="tagDisplay"></div>

<div class="arrowpad" aria-hidden="true">
  <button type="button" id="panUp" title="up">↑</button>
  <button type="button" id="panLeft" title="left">←</button>
  <button type="button" id="panDown" title="down">↓</button>
  <button type="button" id="panRight" title="right">→</button>
</div>

<div class="viewtoggles" id="viewToggles">
  <button type="button" class="toggle" data-key="seeds"><span>seeds</span><span class="switch"><span class="knob"></span></span></button>
  <button type="button" class="toggle" data-key="plants"><span>plants</span><span class="switch"><span class="knob"></span></span></button>
  <button type="button" class="toggle" data-key="labels"><span>labels</span><span class="switch"><span class="knob"></span></span></button>
  <button type="button" class="toggle" data-key="roots"><span>roots</span><span class="switch"><span class="knob"></span></span></button>
</div>

<div class="visitorcount" aria-hidden="true">
  <span class="dot"></span><span id="visitorCountText">1 here now</span>
</div>

<!-- ============ STEP 1 — creation form ============ -->
<div class="card" id="builderCard">
  <div class="titlebar"><span class="closebox"></span></div>
  <div class="cardbody">
    <div class="row">
      <label>feels like <span id="tagCountLabel">(0/3)</span></label>
      <div class="tagbank" id="tagBank"></div>
      <div class="tagcustom">
        <input type="text" id="tagCustomInput" placeholder="add your own…">
        <button type="button" id="tagCustomBtn">add</button>
      </div>
    </div>

    <div class="row">
      <div class="colorgrid">
        <div class="colorpick">
          <span>sky</span>
          <input type="color" id="cBg1" value="#3AB704">
        </div>
        <div class="colorpick">
          <span>soil</span>
          <input type="color" id="cBg2" value="#E2FFCB">
        </div>
        <div class="colorpick">
          <span>seed</span>
          <input type="color" id="cSeed" value="#FFD8B6">
        </div>
        <div class="colorpick">
          <span>labels</span>
          <input type="color" id="cText" value="#FFFFFF">
        </div>
      </div>
    </div>

    <div class="row" style="margin-bottom:0;">
      <label>field pattern</label>
      <div class="patternbank" id="patternBank"></div>
      <div class="scalerow">
        <input type="range" id="fieldScale" min="0.6" max="1.6" step="0.1" value="1">
        <span id="fieldScaleLabel">1.0×</span>
      </div>
    </div>
  </div>
</div>

<!-- seed list — every seed sound added so far, downloadable. Docks below
     the builder card, same left offset. -->
<div class="card" id="seedListCard">
  <div class="titlebar"><span class="closebox"></span></div>
  <div class="cardbody">
    <label>seed list</label>
    <div id="seedListItems"></div>
  </div>
</div>

<!-- add a seed sound to an empty slot -->
<div class="scrim" id="seedScrim">
  <div class="modal">
    <div class="titlebar"><span class="closebox"></span></div>
    <div class="cardbody">
      <p class="sub">seeds are the source of this garden only. others will be able to download and propogate them with other seed sounds.</p>

      <label>track title</label>
      <input type="text" id="sTitle" placeholder="track title">

      <label style="margin-top:1rem;">artist</label>
      <input type="text" id="sArtist" placeholder="artist">

      <label style="margin-top:1rem;">the sound</label>
      <label class="filelabel" id="sFileLabel" tabindex="0">
        <span id="sFileLabelText">choose audio file…</span>
        <input type="file" id="sFile" accept="audio/*" hidden>
      </label>

      <div class="actions">
        <button type="button" class="ghost" id="sCancelBtn">cancel</button>
        <button type="button" class="primary" id="sSaveBtn" disabled>add seed</button>
      </div>
    </div>
  </div>
</div>

<!-- ============ STEP 2 — plant a hybrid sound ============ -->
<div class="scrim" id="plantScrim">
  <div class="modal">
    <div class="titlebar"><span class="closebox"></span></div>
    <div class="cardbody">
      <p class="sub" id="pSub">plant something new in this garden.</p>

      <label>the sound</label>
      <label class="filelabel" id="pFileLabel" tabindex="0">
        <span id="pFileLabelText">choose audio file…</span>
        <input type="file" id="pFile" accept="audio/*" hidden>
      </label>

      <label style="margin-top:1rem;">draw it</label>
      <div>
        <canvas id="pCanvas" width="140" height="140"></canvas>
        <button type="button" class="ghost" id="pClearCanvas" style="margin-left:.6rem; vertical-align:top;">clear</button>
      </div>

      <label style="margin-top:1rem;">drawing color</label>
      <div class="colorpick">
        <input type="color" id="pColor" value="#000000">
      </div>

      <label style="margin-top:1rem;">recipe screenshot (optional)</label>
      <label class="filelabel" id="pRecipeLabel" tabindex="0">
        <span id="pRecipeLabelText">choose image…</span>
        <input type="file" id="pRecipeFile" accept="image/*" hidden>
      </label>

      <label style="margin-top:1rem;">sampled from (optional)</label>
      <div class="tagbank" id="pSampledFromBank"></div>

      <label style="margin-top:1rem;">planted by</label>
      <input type="text" id="pName" placeholder="your name">

      <div class="actions">
        <button type="button" class="ghost" id="pDeleteBtn" style="display:none; margin-right:auto;">delete</button>
        <button type="button" class="ghost" id="pCancelBtn">cancel</button>
        <button type="button" class="primary" id="pSaveBtn" disabled>plant</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
"use strict";
import { playhtml } from "https://unpkg.com/playhtml";

/* ============================================================
   All state lives here, shaped to match the playhtml room-state
   schema we designed (meta / seeds / status). Swap the marked
   SYNC points for playhtml.createPageData(room, ...) + setData
   when you wire up real sync — the shape doesn't need to change.
   ============================================================ */
const TAG_BANK = ["sunny","ambient","delicious","rainy","fuzzy","low bpm","lush","blooming","squishy","pop"];
// set this to your deployed Worker's URL once you've run `wrangler deploy`
// in upload-worker/ (e.g. "https://sound-garden-uploads.YOUR-SUBDOMAIN.workers.dev").
// left empty, plant uploads fall back to session-only blob URLs (same as
// before) — the app still works for local testing, it just can't share
// files across users yet.
const UPLOAD_ENDPOINT = "";
const MAX_TAGS = 3;
const PATTERNS = [
  { id:"lattice", label:"lattice" },   // grid of very thin light lines
  { id:"array",   label:"array" },     // dots arranged in a spiral
  { id:"furrow",  label:"furrow" },    // straight horizontal lines
];

const FIELD_W = 2400, FIELD_H = 1600;   // the field is bigger than the viewport — arrow keys pan it
const STEP = 95;

const garden = {
  id: null,
  meta: {
    tags: [],
    colors: {
      background: ["#3AB704", "#E2FFCB"],   // [sky, soil] — top-to-bottom gradient stops
      seed: "#FFD8B6",                       // also colors the field pattern + decorative seed markers
      text: "#FFFFFF",                       // label color
    },
    pattern: "lattice",       // "lattice" | "array" | "furrow"
    scale: 1,                 // multiplies pattern spacing/dot size
  },
  plants: {},   // plantId -> { id, name, audioRef, recipeImage, sampledFrom (string[]), paths ([[{x,y},...],...]), color, x, y, pinned }
  seeds: {},    // slot index (string "0".."9") -> { title, artist, audioRef }
};

// declared here (not down by connectChannels(), where they conceptually
// belong) because applyColors() runs at top-level during initial page load
// and calls syncMeta(), which reads metaChannel — see the note near
// connectChannels() for the ReferenceError this caused when declared later.
let plantSlotsChannel = null;
let metaChannel = null;
let tagPressChannel = null;
let seedsChannel = null;

/* garden.meta itself now lives in playhtml's synced Page Data (see
   connectChannels below) — that's the real persistence, shared across every
   visitor to this URL, not just this browser. No localStorage needed. */

function newId(len=8){
  return crypto.randomUUID ? crypto.randomUUID().slice(0,len) : Math.random().toString(36).slice(2,2+len);
}

// one random id per browser tab/session — just enough to tell "two distinct
// people" apart for the tag-press easter egg below, not a real user identity
const clientId = newId();

/* hex "#rrggbb" -> "r,g,b" so the seed color can be used at low opacity for the field pattern */
function hexToRgb(hex){
  const m = hex.replace("#","").match(/.{2}/g).map(h => parseInt(h,16));
  return m.join(",");
}

/* true color inversion (255-channel), for the empty-seed hover glow — the
   literal "opposite color" of the seed color used for a planted seed's glow */
function invertHex(hex){
  const [r,g,b] = hex.replace("#","").match(/.{2}/g).map(h => parseInt(h,16));
  const toHex = n => (255-n).toString(16).padStart(2,"0");
  return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
}

const randInt = (min,max) => Math.floor(Math.random()*(max-min+1))+min;

/* hsl -> hex, so random defaults can be constrained to sane saturation/lightness
   ranges instead of raw random RGB (which mostly produces muddy, low-contrast colors) */
function hsl2hex(h, s, l){
  s/=100; l/=100;
  const k = n => (n + h/30) % 12;
  const a = s * Math.min(l, 1-l);
  const f = n => l - a*Math.max(-1, Math.min(k(n)-3, Math.min(9-k(n), 1)));
  const toHex = n => Math.round(255*f(n)).toString(16).padStart(2,"0");
  return `#${toHex(0)}${toHex(8)}${toHex(4)}`;
}

/* random but constrained: a saturated seed color, a sky->soil pair with real
   lightness contrast, and labels picked for contrast against the sky. */
function randomizeDefaultColors(){
  const bgHue = randInt(0,359);
  const seedHue = (bgHue + 180 + randInt(-40,40) + 360) % 360; // roughly complementary -> pops against the field
  const skyLightness = randInt(35,45);
  cBg1.value = hsl2hex(bgHue, randInt(55,75), skyLightness);
  cBg2.value = hsl2hex((bgHue + randInt(-15,15) + 360) % 360, randInt(30,50), randInt(85,92));
  cSeed.value = hsl2hex(seedHue, randInt(65,85), randInt(55,70));
  cText.value = skyLightness < 50 ? "#FFFFFF" : "#000000";
}

const NS = "http://www.w3.org/2000/svg";
function svgEl(tag, attrs){
  const el = document.createElementNS(NS, tag);
  for(const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

/* seed slots — one fixed layout per pattern (not random), so a given pattern
   always shows its seeds in the same arrangement, matching how that pattern
   reads visually (grid cells for lattice, spiral arms for array, rows for furrow). */
const CX = FIELD_W/2, CY = FIELD_H/2;
const SEED_COLS = [-400,-200,0,200,400];

/* base offsets from field center, one fixed layout per pattern (10 seeds each) —
   actual on-screen position is these offsets times the current scale, so slot
   placement spreads/tightens together with the pattern itself. */
const LATTICE_ROWS = [
  { dy:-180, xs:[-300, 0, 300] },
  { dy:0,    xs:[-375, -125, 125, 375] },
  { dy:180,  xs:[-300, 0, 300] },
];
const SEED_SLOTS_BASE = {
  // 3 / 4 / 3 rows — deliberately not the same grid as furrow, so the two
  // patterns' seed layouts actually look different from each other
  lattice: LATTICE_ROWS.flatMap(row => row.xs.map(dx => ({ dx, dy:row.dy }))),
  furrow:  SEED_COLS.flatMap(dx => [{dx,dy:-90}, {dx,dy:90}]),
};
function arraySlotOffsets(scale){
  // same spiral formula the pattern itself uses, so seeds land along its arms
  return Array.from({length:10}, (_,i) => {
    const t = 1 + i*0.9, r = 44*t*scale;
    return { dx:r*Math.cos(t), dy:r*Math.sin(t) };
  });
}
/* the current pattern's seed positions, in field coordinates — these double
   as the only plantable hot spots (see seedHotSpots below), so this is the
   single source of truth both renderSeedSlots and the field's hover/click
   handling read from. */
function seedFieldOffsets(){
  const scale = garden.meta.scale || 1;
  return garden.meta.pattern === "array"
    ? arraySlotOffsets(scale)
    : SEED_SLOTS_BASE[garden.meta.pattern].map(o => ({ dx:o.dx*scale, dy:o.dy*scale }));
}

/* an empty slot invites a click (opens the add-seed modal); a filled one
   shows "title - artist" and previews on hover, same as a plant does. */
function renderSeedSlots(){
  const layer = document.getElementById("seedSlots");
  layer.innerHTML = "";
  seedFieldOffsets().forEach((o, i) => {
    const seed = garden.seeds[i];
    const el = document.createElement("div");
    el.className = "seedslot" + (seed ? "" : " empty");
    el.style.left = (CX + o.dx) + "px"; el.style.top = (CY + o.dy) + "px";
    el.style.color = garden.meta.colors.text;
    // a planted seed glows its own seed color on hover; an empty one glows
    // the exact opposite (inverted) color, so the two states read distinctly
    el.style.setProperty("--glow", seed ? garden.meta.colors.seed : invertHex(garden.meta.colors.seed));
    el.style.setProperty("--text-color", garden.meta.colors.text);
    el.style.setProperty("--soil-color", garden.meta.colors.background[1]);
    const dot = document.createElement("span");
    dot.className = "dot"; dot.style.background = garden.meta.colors.seed;
    const label = document.createElement("span");
    label.className = "txt";
    label.textContent = seed ? `${seed.title} - ${seed.artist}` : "+ add seed";
    el.appendChild(dot); el.appendChild(label);

    if(seed){
      let audioEl = null;
      el.addEventListener("mouseenter", () => {
        const ref = seed.audioRef || localSeedAudioRefs[i];
        if(ref){ audioEl = new Audio(ref); audioEl.loop = true; audioEl.play().catch(() => {}); }
        // peek at the roots regardless of the persistent toggle state —
        // mouseleave reverts to whatever that toggle actually says
        document.getElementById("connectionsLayer").style.display = "";
      });
      el.addEventListener("mouseleave", () => {
        audioEl?.pause(); audioEl = null;
        applyViewToggles();
      });
      // click opens the seed list panel instead of touching roots at all —
      // hover is what shows them now, see mouseenter/mouseleave above
      el.addEventListener("click", e => { e.stopPropagation(); showSeedList(); });
    } else {
      // stopPropagation matters here — without it this click also bubbles to
      // the field's own click handler, which independently checks proximity
      // to a *plant* hot spot (a completely different, denser grid) and
      // would immediately close this seed modal and open the plant one
      // instead, since a seed slot and a plant hot spot can easily overlap
      el.addEventListener("click", e => { e.stopPropagation(); openSeedModal(i); });
    }
    layer.appendChild(el);
  });
}

const SVG_NS = "http://www.w3.org/2000/svg";

function renderPlantSlots(){
  const layer = document.getElementById("plantSlots");
  layer.innerHTML = "";
  Object.values(garden.plants || {}).forEach(p => {
    const el = document.createElement("div");
    el.className = "plantmark" + (p.pinned ? " pinned" : "");
    el.style.left = p.x + "px"; el.style.top = p.y + "px";
    el.title = p.name;

    if(p.paths && p.paths.length){
      const svg = document.createElementNS(SVG_NS, "svg");
      svg.setAttribute("viewBox", `0 0 ${pCanvas.width} ${pCanvas.height}`);
      svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
      p.paths.forEach(stroke => {
        if(stroke.length < 2) return;
        const poly = document.createElementNS(SVG_NS, "polyline");
        poly.setAttribute("points", stroke.map(pt => `${pt.x},${pt.y}`).join(" "));
        poly.setAttribute("fill", "none");
        poly.setAttribute("stroke", p.color);
        poly.setAttribute("stroke-width", "1.5");
        poly.setAttribute("stroke-linecap", "butt");
        poly.setAttribute("stroke-linejoin", "miter");
        poly.setAttribute("vector-effect", "non-scaling-stroke");
        svg.appendChild(poly);
      });
      el.appendChild(svg);
    } else {
      const fallback = document.createElement("div");
      fallback.className = "fallback";
      fallback.style.background = p.color;
      el.appendChild(fallback);
    }

    // a small dot in the plant's own color, next to its name — pulses
    // while the plant is pinned instead of the old drop-shadow
    const labelDot = document.createElement("span");
    labelDot.className = "labeldot";
    labelDot.style.background = p.color;
    el.appendChild(labelDot);

    // the planter's name — same "txt" class the seed labels use, so the
    // existing "labels" toggle shows/hides this one too for free
    const label = document.createElement("span");
    label.className = "txt";
    label.textContent = p.name;
    label.style.color = garden.meta.colors.text;
    el.appendChild(label);

    let audioEl = null;
    let recipeImgEl = null;
    el.addEventListener("mouseenter", () => {
      const ref = p.audioRef || localPlantAudioRefs[p.id];
      if(ref){ audioEl = new Audio(ref); audioEl.loop = true; audioEl.play().catch(() => {}); }
      if(p.recipeImage){
        recipeImgEl = document.createElement("img");
        recipeImgEl.className = "recipepreview";
        recipeImgEl.src = p.recipeImage;
        el.appendChild(recipeImgEl);
      }
    });
    el.addEventListener("mouseleave", () => {
      audioEl?.pause(); audioEl = null;
      recipeImgEl?.remove(); recipeImgEl = null;
    });
    el.addEventListener("click", e => e.stopPropagation()); // don't let this also trigger the field's plant-here click

    // drag to reposition (from anywhere on the marker) — persists for
    // everyone via plantSlotsChannel. A mousedown that never actually moves
    // is a plain click instead: toggles pinned. A second one landing soon
    // after (hand-rolled double-click detection, not the native dblclick
    // event, so it isn't thrown off by renderPlantSlots rebuilding this
    // element's DOM node in between) opens this plant for editing.
    el.addEventListener("mousedown", e => {
      e.stopPropagation();
      e.preventDefault();
      const startX = e.clientX, startY = e.clientY;
      const origX = p.x, origY = p.y;
      let moved = false;
      function onMove(ev){
        const dx = ev.clientX - startX, dy = ev.clientY - startY;
        if(!moved && Math.hypot(dx, dy) < 4) return;
        moved = true;
        p.x = origX + dx; p.y = origY + dy;
        el.style.left = p.x + "px"; el.style.top = p.y + "px";
      }
      function onUp(){
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        if(moved){
          garden.plants[p.id] = p;
          plantSlotsChannel?.setData(draft => { draft[p.id] = p; });
        } else if(Date.now() - (lastPlantClickTimes[p.id] || 0) < 350){
          lastPlantClickTimes[p.id] = 0;
          openPlantEditModal(p);
        } else {
          lastPlantClickTimes[p.id] = Date.now();
          p.pinned = !p.pinned;
          garden.plants[p.id] = p;
          plantSlotsChannel?.setData(draft => { draft[p.id] = p; });
          renderPlantSlots();
        }
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
    layer.appendChild(el);
  });
  applyViewToggles();
  renderConnections();   // plants (and their positions) may have changed
}

/* dashed curved lines from every filled seed to each plant whose
   sampledFrom includes it. Always rendered (same as the seed/plant/label
   layers) — visibility is purely VIEW_STATE.roots via applyViewToggles, the
   same "roots" switch in the bottom bar. Clicking a filled seed doesn't
   pick which one to show anymore — it just flips that same switch, via
   toggleView, exactly like clicking the bottom-bar button does. */
function renderConnections(){
  const svg = document.getElementById("connectionsLayer");
  svg.innerHTML = "";
  svg.setAttribute("viewBox", `0 0 ${FIELD_W} ${FIELD_H}`);
  const offsets = seedFieldOffsets();
  const plants = Object.values(garden.plants || {});
  for(const i in garden.seeds){
    const seed = garden.seeds[i];
    if(!seed) continue;
    const label = `${seed.title} - ${seed.artist}`;
    const o = offsets[i];
    const from = { x: CX + o.dx, y: CY + o.dy };
    const connected = plants.filter(p => Array.isArray(p.sampledFrom) && p.sampledFrom.includes(label));
    for(const p of connected){
      // bow the line out to the side, perpendicular to the straight path
      // between them, so overlapping connections stay visually distinct
      // instead of stacking as straight lines
      const dx = p.x - from.x, dy = p.y - from.y;
      const len = Math.hypot(dx, dy) || 1;
      const bow = 40;
      const midX = (from.x + p.x) / 2 - (dy / len) * bow;
      const midY = (from.y + p.y) / 2 + (dx / len) * bow;
      const path = document.createElementNS(SVG_NS, "path");
      path.setAttribute("d", `M ${from.x} ${from.y} Q ${midX} ${midY} ${p.x} ${p.y}`);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", p.color);
      path.setAttribute("stroke-width", "1");
      path.setAttribute("stroke-dasharray", "6 5");
      path.setAttribute("vector-effect", "non-scaling-stroke");
      svg.appendChild(path);
    }
  }
}

/* draws the current garden.meta.colors/pattern onto the field (gradient)
   and the SVG layer (pattern lines/dots), sized to the whole (bigger-than-
   viewport) field rather than just what's on screen. */
function renderField(){
  const { background, text, seed } = garden.meta.colors;
  const fieldEl = document.getElementById("field");
  fieldEl.style.background = `linear-gradient(to bottom, ${background[0]}, ${background[1]})`; // sky -> soil
  fieldEl.style.color = text;
  renderSeedSlots();

  const svg = document.getElementById("patternLayer");
  svg.innerHTML = "";
  svg.setAttribute("viewBox", `0 0 ${FIELD_W} ${FIELD_H}`);
  svg.setAttribute("preserveAspectRatio", "none");
  const rgb = hexToRgb(seed);

  const scale = garden.meta.scale || 1;
  const LATTICE_BASE = 52;              // grid cell size (2x the original default)
  const FURROW_BASE = LATTICE_BASE / 2; // furrow lines are half as spread out as lattice

  if(garden.meta.pattern === "array"){
    // dots arranged in an outward spiral from center, spaced evenly along
    // the curve (not by fixed angle step, or it thins into spokes at radius) —
    // wider pitch + smaller dots so it reads as a spiral, not concentric rings.
    const maxR = Math.hypot(FIELD_W, FIELD_H)/2 + 60;
    const a = 16 * scale;      // spiral pitch — distance between successive arms
    const dotGap = 10 * scale; // arc-length distance between dots — doubled density vs before
    const dotR = Math.max(0.6, 0.9 * scale);
    const group = svgEl("g", { fill:`rgba(${rgb},.55)` });
    let t = 1;
    for(let r = a*t; r <= maxR; r = a*t){
      const x = CX + r*Math.cos(t), y = CY + r*Math.sin(t);
      group.appendChild(svgEl("circle", { cx:x.toFixed(1), cy:y.toFixed(1), r:dotR }));
      t += dotGap / r;       // shrink angular step as radius grows -> even spacing
    }
    svg.appendChild(group);
  } else {
    // lattice (grid) or furrow (horizontal-only) — both are a tiled <pattern>
    const spacing = (garden.meta.pattern === "lattice" ? LATTICE_BASE : FURROW_BASE) * scale;
    const defs = svgEl("defs", {});
    const pattern = svgEl("pattern", { id:"fieldPattern", width:spacing, height:spacing, patternUnits:"userSpaceOnUse" });
    const stroke = `rgba(${rgb},.4)`;
    pattern.appendChild(svgEl("line", { x1:0, y1:spacing/2, x2:spacing, y2:spacing/2, stroke, "stroke-width":0.6 }));
    if(garden.meta.pattern === "lattice"){
      pattern.appendChild(svgEl("line", { x1:spacing/2, y1:0, x2:spacing/2, y2:spacing, stroke, "stroke-width":0.6 }));
    }
    defs.appendChild(pattern);
    svg.appendChild(defs);
    svg.appendChild(svgEl("rect", { width:"100%", height:"100%", fill:"url(#fieldPattern)" }));
  }

  applyViewToggles(); // re-apply since renderSeedSlots() just rebuilt the label spans
}

/* ---- tag bank ---- */
const tagBankEl = document.getElementById("tagBank");
const tagCountLabel = document.getElementById("tagCountLabel");
function renderTagBank(){
  tagBankEl.innerHTML = "";
  // bank tags first, in fixed order
  for(const t of TAG_BANK){
    const chosen = garden.meta.tags.includes(t);
    const b = document.createElement("button");
    b.type = "button"; b.className = "tag"; b.textContent = t;
    b.setAttribute("data-selected", chosen ? "true" : "false");
    b.disabled = !chosen && garden.meta.tags.length >= MAX_TAGS;
    b.addEventListener("click", () => toggleTag(t));
    tagBankEl.appendChild(b);
  }
  // then any custom (typed-in) tags — these aren't in TAG_BANK, so they need
  // their own chips or they're stored in state but never shown (the bug).
  for(const t of garden.meta.tags){
    if(TAG_BANK.includes(t)) continue;
    const b = document.createElement("button");
    b.type = "button"; b.className = "tag"; b.textContent = t;
    b.setAttribute("data-selected", "true");
    b.addEventListener("click", () => toggleTag(t));
    tagBankEl.appendChild(b);
  }
  tagCountLabel.textContent = `(${garden.meta.tags.length}/${MAX_TAGS})`;
  renderTagDisplay();
}

/* top-center readout of the chosen tags — mirrors the bank, glows the
   garden's seed color on hover, and doubles as the tag-press easter egg
   trigger (see checkTagPresses). */
const tagDisplayEl = document.getElementById("tagDisplay");
function renderTagDisplay(){
  tagDisplayEl.innerHTML = "";
  for(const t of garden.meta.tags){
    const s = document.createElement("span");
    s.textContent = t;
    s.title = "invite a friend";   // hints at the two-person press below
    s.style.setProperty("--glow", garden.meta.colors.seed);
    s.addEventListener("click", () => pressTag(t));
    tagDisplayEl.appendChild(s);
  }
}

/* two DISTINCT people (browser tabs) pressing the same tag within a couple
   seconds of each other sends everyone currently on the page to another
   page — a little synced "press together to unlock" moment. Each click
   records {clientId, ts} into that tag's shared list; checkTagPresses (run
   on every update, by everyone) looks for 2+ distinct clientIds still
   inside the time window. */
const TAG_PRESS_WINDOW_MS = 2000;
function pressTag(t){
  const now = Date.now();
  tagPressChannel?.setData(draft => {
    const recent = (draft[t] || []).filter(e => now - e.ts < TAG_PRESS_WINDOW_MS);
    recent.push({ clientId, ts: now });
    draft[t] = recent;
  });
}
function checkTagPresses(data){
  const now = Date.now();
  for(const t in data){
    const recent = (data[t] || []).filter(e => now - e.ts < TAG_PRESS_WINDOW_MS);
    if(new Set(recent.map(e => e.clientId)).size >= 2){
      window.location.href = `http://soundcloud.com/tags/${encodeURIComponent(t)}`;
      return;
    }
  }
}

function toggleTag(t){
  const i = garden.meta.tags.indexOf(t);
  if(i>=0) garden.meta.tags.splice(i,1);
  else if(garden.meta.tags.length < MAX_TAGS) garden.meta.tags.push(t);
  renderTagBank();
  syncMeta();
}
document.getElementById("tagCustomBtn").addEventListener("click", () => {
  const input = document.getElementById("tagCustomInput");
  const v = input.value.trim().toLowerCase();
  if(!v || garden.meta.tags.length >= MAX_TAGS || garden.meta.tags.includes(v)) return;
  garden.meta.tags.push(v);
  input.value = "";
  renderTagBank();
  syncMeta();
});

/* ---- colors ---- */
const cBg1 = document.getElementById("cBg1"), cBg2 = document.getElementById("cBg2");
const cText = document.getElementById("cText"), cSeed = document.getElementById("cSeed");
function applyColors(){
  garden.meta.colors = { background:[cBg1.value, cBg2.value], text:cText.value, seed:cSeed.value };
  renderField();
  syncMeta();
}
[cBg1,cBg2,cText,cSeed].forEach(el => el.addEventListener("input", applyColors));

/* ---- scale slider ---- */
const fieldScale = document.getElementById("fieldScale");
const fieldScaleLabel = document.getElementById("fieldScaleLabel");
fieldScale.addEventListener("input", () => {
  garden.meta.scale = parseFloat(fieldScale.value);
  fieldScaleLabel.textContent = garden.meta.scale.toFixed(1) + "×";
  renderField();
  syncMeta();
});

/* ---- pattern picker ---- */
const patternBankEl = document.getElementById("patternBank");
function renderPatternBank(){
  patternBankEl.innerHTML = "";
  for(const p of PATTERNS){
    const b = document.createElement("button");
    b.type = "button"; b.className = "patternbtn"; b.textContent = p.label;
    b.setAttribute("data-selected", garden.meta.pattern === p.id ? "true" : "false");
    b.addEventListener("click", () => {
      garden.meta.pattern = p.id;
      renderPatternBank();
      renderField();
      syncMeta();
    });
    patternBankEl.appendChild(b);
  }
}

renderTagBank();
renderPatternBank();

/* ---- bottom toggle bar: seeds / plants / roots / labels visibility ---- */
const VIEW_STATE = { seeds:true, plants:true, labels:true, roots:true };
function applyViewToggles(){
  document.getElementById("seedSlots").style.display = VIEW_STATE.seeds ? "" : "none";
  document.getElementById("plantSlots").style.display = VIEW_STATE.plants ? "" : "none";
  document.getElementById("connectionsLayer").style.display = VIEW_STATE.roots ? "" : "none";
  document.querySelectorAll("#seedSlots .txt, #plantSlots .txt")
    .forEach(el => el.style.display = VIEW_STATE.labels ? "" : "none");
}
// shared by the bottom-bar buttons themselves and anything else that wants
// to flip one of these (a filled seed's click uses this same function for
// "roots" — same mechanism, not a separate parallel toggle)
function toggleView(key){
  VIEW_STATE[key] = !VIEW_STATE[key];
  document.querySelectorAll(`#viewToggles button[data-key="${key}"]`)
    .forEach(b => b.setAttribute("data-on", String(VIEW_STATE[key])));
  applyViewToggles();
}
document.querySelectorAll("#viewToggles button").forEach(b => {
  b.setAttribute("data-on", "true");
  b.addEventListener("click", () => toggleView(b.dataset.key));
});

const viewportEl = document.getElementById("viewport");
const fieldEl = document.getElementById("field");
fieldEl.style.width = FIELD_W + "px";
fieldEl.style.height = FIELD_H + "px";

// these local defaults only matter for whoever connects to this garden's
// shared channel first ever — connectChannels() below immediately overwrites
// garden.meta with whatever's already synced for everyone else on this URL.
randomizeDefaultColors();
applyColors();

/* ---- arrow-key / arrow-pad panning, same idea as the main garden view ---- */
function panBy(dx, dy){
  viewportEl.scrollBy({ left:dx, top:dy, behavior:"smooth" });
}
document.getElementById("panUp").addEventListener("click", () => panBy(0,-STEP));
document.getElementById("panDown").addEventListener("click", () => panBy(0,STEP));
document.getElementById("panLeft").addEventListener("click", () => panBy(-STEP,0));
document.getElementById("panRight").addEventListener("click", () => panBy(STEP,0));

document.addEventListener("keydown", e => {
  const typing = /input|textarea/i.test(e.target.tagName) || e.target.isContentEditable;
  if(typing || plantScrim.classList.contains("open") || seedScrim.classList.contains("open")) return;
  const move = { ArrowLeft:[-STEP,0], ArrowRight:[STEP,0], ArrowUp:[0,-STEP], ArrowDown:[0,STEP] }[e.key];
  if(move){ e.preventDefault(); panBy(move[0], move[1]); }
});

// Escape closes whatever's open — works even while typing in one of these
// panels' own fields, unlike the arrow-key panning guard above.
document.addEventListener("keydown", e => {
  if(e.key !== "Escape") return;
  hideBuilder(); hidePlantModal(); hideSeedModal(); hideSeedList();
});

// start centered on the field, like the main garden view does — deferred a
// frame so the viewport has actually been laid out before we measure it
requestAnimationFrame(() => {
  viewportEl.scrollTo({ left: FIELD_W/2 - viewportEl.clientWidth/2, top: FIELD_H/2 - viewportEl.clientHeight/2 });
});

/* ---- create garden ---- */
// purely a namespace for this garden's uploaded files (see uploadSeedFile's
// X-Garden-Id header) — no longer decides which synced room a visitor joins,
// see connectChannels below.
garden.id = newId();

const builderCardEl = document.getElementById("builderCard");
// declared here (not down by the click listener below) because hideBuilder()
// is called immediately, and showBuilder()/hideBuilder() both reference this

   the swirl button itself shows pressed (inverted) while the panel is open —

function hideBuilder(){ builderCardEl.style.display = "none"; navToggleBtn.setAttribute("data-open", "false"); }

/* ==========================================================================
   PLAYHTML — plants and garden meta (colors/tags/pattern/scale) sync live
   across everyone who has the link, plus always-on cursor presence. Page
   Data (one JSON blob per channel, not per-element can-play) — see the
   earlier research in this conversation for why that's the right fit here.

   HONEST LIMITATION: playhtml syncs JSON only. A plant's audioRef is a
   `blob:` URL, valid only in the browser tab that uploaded it, unless
   UPLOAD_ENDPOINT is configured — there is no real file storage otherwise,
   so a plant's *metadata* syncs to every visitor but the *audio itself*
   is only actually playable by whoever planted it. I can't verify live
   cross-browser sync from here (this preview is a single browser) — worth
   testing yourself in two tabs/two browsers once you're ready, per how you
   wanted to handle playhtml testing earlier in this conversation.

   CURSORS FIX: the option is `cursors: { enabled: true }`, not `cursors: {}`
   — an empty object leaves cursors disabled (confirmed by reading playhtml's
   own source: `if(!e.enabled){ return; }` gates the whole cursor client).
   Passing `{}` previously meant cursors were silently never turned on.
   ========================================================================== */
// init() returns a promise, and createPageData() (called inside
// connectChannels) isn't usable until it resolves — calling it either
// before init() or immediately after the (synchronous-looking) init() call
// throws "not available before init()", confirmed by testing directly
// against the real build. That was an uncaught top-level error that
// silently aborted the rest of the script (same class of bug as the
// earlier metaChannel TDZ issue), which is why the plant modal broke too.
// Chaining .then() is the fix.
playhtml.init({ cursors: { enabled: true } }).then(connectChannels);

/* live visitor count — window.cursors.allColors is playhtml's own list of
   currently-connected players in this room (confirmed against the real
   dist build, not just the docs); .length is exactly "here right now", not
   historic. It isn't available the instant init() returns (the cursor room
   connects async), so poll briefly until it exists, then just listen. */
const visitorCountText = document.getElementById("visitorCountText");
function renderVisitorCount(){
  const n = window.cursors ? window.cursors.allColors.length : 1;
  visitorCountText.textContent = `${n} here now`;
}
(function waitForCursors(){
  if(window.cursors){
    renderVisitorCount();
    window.cursors.on("allColors", renderVisitorCount);
  } else {
    setTimeout(waitForCursors, 200);
  }
})();

// (plantSlotsChannel/metaChannel are declared much earlier in the script
// now — see near the top — because applyColors() runs at top-level during
// initial page load and calls syncMeta(), which reads metaChannel; a `let`
// declared this late created a real temporal-dead-zone ReferenceError that
// silently aborted all script execution after it, including every event
// listener below. Found this by testing, not by inspection — every button
// appeared to just stop working.)

/* connect once, immediately on load — guarded so a stray repeat call is a
   no-op. Channel names are fixed (not per-visitor garden.id) so every
   visitor on this same URL joins the same synced documents, exactly like
   playhtml's cursor room already does by default (it's scoped to
   location.pathname + search). Using garden.id here was the actual bug:
   each browser generated its own random id, so no two visitors were ever
   in the same room for colors/tags/plants even though cursors worked. */
function connectChannels(){
  if(plantSlotsChannel) return;

  plantSlotsChannel = playhtml.createPageData("garden-plants", garden.plants);
  garden.plants = plantSlotsChannel.getData();
  renderPlantSlots();   // draw whatever was already planted by anyone — the
                        // only render calls before this point ran with the
                        // empty local default, since this pull is async
  plantSlotsChannel.onUpdate(data => { garden.plants = data; renderPlantSlots(); });

  // colors/tags/pattern/scale. Whole-object/array replacement is fine here
  // (confirmed against the real build) — it's only *index* assignment into
  // a top-level array that playhtml's Page Data rejects, and meta is a
  // plain object throughout.
  metaChannel = playhtml.createPageData("garden-meta", garden.meta);
  garden.meta = metaChannel.getData();
  applyMetaToUI();
  metaChannel.onUpdate(data => { garden.meta = data; applyMetaToUI(); });

  // tag-press easter egg — see checkTagPresses below
  tagPressChannel = playhtml.createPageData("tag-presses", {});
  tagPressChannel.onUpdate(checkTagPresses);

  seedsChannel = playhtml.createPageData("garden-seeds", garden.seeds);
  garden.seeds = seedsChannel.getData();
  onSeedsChanged();
  seedsChannel.onUpdate(data => { garden.seeds = data; onSeedsChanged(); });
}

/* re-renders everywhere seed title/artist text shows up: the field markers
   themselves, the seed-list panel, and the plant modal's "sampled from"
   options — kept in one place so nothing can drift out of sync. */
function onSeedsChanged(){
  renderSeedSlots();
  renderSeedList();
  renderSampledFromBank();
  renderConnections();
}

/* pushes garden.meta as a whole to everyone else in the room */
function syncMeta(){ metaChannel?.setData(draft => Object.assign(draft, garden.meta)); }

/* the reverse of applyColors()/etc — takes garden.meta (just replaced by an
   incoming sync, or restored on connect) and pushes it into the actual
   inputs + re-renders, instead of reading the inputs to build garden.meta. */
function applyMetaToUI(){
  cBg1.value = garden.meta.colors.background[0];
  cBg2.value = garden.meta.colors.background[1];
  cSeed.value = garden.meta.colors.seed;
  cText.value = garden.meta.colors.text;
  fieldScale.value = garden.meta.scale;
  fieldScaleLabel.textContent = garden.meta.scale.toFixed(1) + "×";
  renderTagBank();
  renderPatternBank();
  renderField();
}

/* streams a file straight to the Worker, which writes it into R2 and hands
   back the public URL. Throws on any failure — the caller decides what to
   fall back to (see the plant save handler). */
async function uploadSeedFile(file, key){
  if(!UPLOAD_ENDPOINT) throw new Error("UPLOAD_ENDPOINT not configured");
  const res = await fetch(`${UPLOAD_ENDPOINT}/upload`, {
    method: "POST",
    headers: {
      "Content-Type": file.type || "application/octet-stream",
      "X-Garden-Id": garden.id,
      "X-Slot-Index": String(key),
      "X-File-Name": file.name,
    },
    body: file,
  });
  if(!res.ok) throw new Error(`upload failed: ${res.status}`);
  const { url } = await res.json();
  return url;
}

   PLANTING — a plant carries a small freehand drawing and gets placed
   wherever the user clicked on the field. Hovering an empty patch of ground
   shows a square outline; clicking it opens this modal with that spot
   pre-filled as the plant's position.
   ========================================================================== */
const plantScrim = document.getElementById("plantScrim");
const pSub = document.getElementById("pSub");
const pFile = document.getElementById("pFile");
const pFileLabel = document.getElementById("pFileLabel");
const pFileLabelText = document.getElementById("pFileLabelText");
const pRecipeFile = document.getElementById("pRecipeFile");
const pRecipeLabel = document.getElementById("pRecipeLabel");
const pRecipeLabelText = document.getElementById("pRecipeLabelText");
const pSampledFromBank = document.getElementById("pSampledFromBank");
const pCanvas = document.getElementById("pCanvas");
const pClearCanvas = document.getElementById("pClearCanvas");
const pColor = document.getElementById("pColor");
const pName = document.getElementById("pName");
const pSaveBtn = document.getElementById("pSaveBtn");
const pDeleteBtn = document.getElementById("pDeleteBtn");
const pCancelBtn = document.getElementById("pCancelBtn");
const hoverSquare = document.getElementById("hoverSquare");

const localPlantAudioRefs = {};
const localSeedAudioRefs = {};
// keyed by plant id, not a per-marker closure variable — a pin-toggle click
// re-renders the whole plant layer (fresh DOM node, fresh closure) before a
// second click could ever land, so timing has to survive that rebuild
const lastPlantClickTimes = {};
let plantDraftFile = null;
let plantDraftRecipeFile = null;
let pendingPlantPos = null;
let editingPlantId = null;   // null while planting new — set to a plant's id while editing it
let selectedSampledFrom = [];   // "title - artist" strings, multi-select chips — see renderSampledFromBank

const pctx = pCanvas.getContext("2d");
// butt cap/miter join (canvas defaults) instead of round — jagged edges,
// no smoothing, matching the field's SVG polylines exactly
pctx.lineWidth = 1.5; pctx.lineCap = "butt"; pctx.lineJoin = "miter";
pColor.addEventListener("input", () => { pctx.strokeStyle = pColor.value; });
let drawing = false;
// the canvas is just live drawing feedback in the modal — what actually gets
// saved/rendered on the map is the raw stroke points themselves (see
// renderPlantSlots), as SVG polylines, so the marker is the drawing itself
// instead of a rasterized square thumbnail.
let plantDraftPaths = [];
let currentStroke = null;
function canvasPos(e){
  const r = pCanvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
pCanvas.addEventListener("pointerdown", e => {
  drawing = true;
  const p = canvasPos(e);
  currentStroke = [p];
  plantDraftPaths.push(currentStroke);
  pctx.beginPath(); pctx.moveTo(p.x, p.y);
});
pCanvas.addEventListener("pointermove", e => {
  if(!drawing) return;
  const p = canvasPos(e);
  currentStroke.push(p);
  pctx.lineTo(p.x, p.y); pctx.stroke();
});
window.addEventListener("pointerup", () => { drawing = false; validatePlant(); });
pClearCanvas.addEventListener("click", () => {
  pctx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  plantDraftPaths = [];
  validatePlant();
});

pFile.addEventListener("change", () => {
  plantDraftFile = pFile.files[0] || null;
  pFileLabelText.textContent = plantDraftFile ? plantDraftFile.name : "choose audio file…";
  pFileLabel.classList.toggle("has-file", !!plantDraftFile);
  validatePlant();
});
pFileLabel.addEventListener("keydown", e => { if(e.key==="Enter"||e.key===" "){ e.preventDefault(); pFile.click(); } });

// optional — no validation gate, keeps whatever (if anything) was there
// before when editing and nothing new is chosen
pRecipeFile.addEventListener("change", () => {
  plantDraftRecipeFile = pRecipeFile.files[0] || null;
  pRecipeLabelText.textContent = plantDraftRecipeFile ? plantDraftRecipeFile.name : "choose image…";
  pRecipeLabel.classList.toggle("has-file", !!plantDraftRecipeFile);
});
pRecipeLabel.addEventListener("keydown", e => { if(e.key==="Enter"||e.key===" "){ e.preventDefault(); pRecipeFile.click(); } });

pName.addEventListener("input", validatePlant);
function validatePlant(){
  // a drawing is required now — no plant without one, so there's never a
  // plain colored box on the map, only ever the drawing itself. A new
  // audio file is only required when planting new — editing can keep
  // whatever audio was already there.
  const needsFile = !editingPlantId;
  pSaveBtn.disabled = (needsFile && !plantDraftFile) || !pName.value.trim() || !plantDraftPaths.length;
}

function redrawPaths(paths){
  pctx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  for(const stroke of paths){
    if(stroke.length < 2) continue;
    pctx.beginPath();
    pctx.moveTo(stroke[0].x, stroke[0].y);
    for(const pt of stroke.slice(1)) pctx.lineTo(pt.x, pt.y);
    pctx.stroke();
  }
}

/* "sampled from" options are just every filled seed's "title - artist"
   text, doubling as the option's own value — reused as-is in both the
   plant modal and the seed-list panel (see renderSeedList). */
/* chip multi-select, same look/interaction as the "feels like" tag bank —
   one chip per filled seed, toggled on/off, tracked in selectedSampledFrom. */
function renderSampledFromBank(){
  pSampledFromBank.innerHTML = "";
  const seeds = Object.values(garden.seeds || {});
  if(!seeds.length){
    const empty = document.createElement("span");
    empty.className = "sub";
    empty.style.margin = "0";
    empty.textContent = "no seeds planted yet";
    pSampledFromBank.appendChild(empty);
    return;
  }
  for(const seed of seeds){
    const label = `${seed.title} - ${seed.artist}`;
    const b = document.createElement("button");
    b.type = "button"; b.className = "tag"; b.textContent = label;
    b.setAttribute("data-selected", selectedSampledFrom.includes(label) ? "true" : "false");
    b.addEventListener("click", () => toggleSampledFrom(label));
    pSampledFromBank.appendChild(b);
  }
}
function toggleSampledFrom(label){
  const i = selectedSampledFrom.indexOf(label);
  if(i >= 0) selectedSampledFrom.splice(i, 1);
  else selectedSampledFrom.push(label);
  renderSampledFromBank();
}

function openPlantModal(pos){
  editingPlantId = null;
  pSub.textContent = "plant something new in this garden.";
  pSaveBtn.textContent = "plant";
  pendingPlantPos = pos || { x: CX, y: CY };
  plantDraftFile = null; plantDraftRecipeFile = null;
  pFile.value = ""; pFileLabelText.textContent = "choose audio file…"; pFileLabel.classList.remove("has-file");
  pRecipeFile.value = ""; pRecipeLabelText.textContent = "choose image…"; pRecipeLabel.classList.remove("has-file");
  pName.value = ""; pctx.clearRect(0, 0, pCanvas.width, pCanvas.height); plantDraftPaths = [];
  pColor.value = garden.meta.colors.seed; pctx.strokeStyle = pColor.value;

/* editing reuses the same modal — pre-filled with the plant's current
   name/drawing, position unchanged. A new audio/recipe file is optional;
   leaving either blank keeps what was already there (see pSaveBtn below). */
function openPlantEditModal(p){
  editingPlantId = p.id;
  pSub.textContent = "edit this planting.";
  pSaveBtn.textContent = "save";
  pendingPlantPos = { x: p.x, y: p.y };
  plantDraftFile = null; plantDraftRecipeFile = null;
  pFile.value = ""; pFileLabelText.textContent = "choose audio file… (keeps current if left blank)"; pFileLabel.classList.remove("has-file");
  pRecipeFile.value = ""; pRecipeLabelText.textContent = p.recipeImage ? "choose image… (keeps current if left blank)" : "choose image…"; pRecipeLabel.classList.remove("has-file");
  pName.value = p.name;
  pColor.value = p.color; pctx.strokeStyle = p.color;
  plantDraftPaths = p.paths.map(stroke => stroke.map(pt => ({ ...pt })));
  redrawPaths(plantDraftPaths);
  // backward-compat: sampledFrom used to be a single string before this
  // became a multi-select
  selectedSampledFrom = Array.isArray(p.sampledFrom) ? p.sampledFrom.slice() : (p.sampledFrom ? [p.sampledFrom] : []);
  renderSampledFromBank();
  pDeleteBtn.style.display = "";

function hidePlantModal(){ plantScrim?.classList.remove("open"); editingPlantId = null; }
pCancelBtn.addEventListener("click", hidePlantModal);

pDeleteBtn.addEventListener("click", () => {

pSaveBtn.addEventListener("click", async () => {
  const isEdit = !!editingPlantId;
  pSaveBtn.disabled = true; pSaveBtn.textContent = isEdit ? "saving…" : "planting…";
  const plantId = editingPlantId || newId();
  const existing = garden.plants[plantId];

  let audioRef = existing?.audioRef;
  if(plantDraftFile){
    audioRef = await uploadSeedFile(plantDraftFile, `plant-${plantId}`).catch(err => {
      console.warn("plant upload failed, falling back to a local-only blob URL:", err);
      return URL.createObjectURL(plantDraftFile);
    });
    localPlantAudioRefs[plantId] = audioRef;
  }

  let recipeImage = existing?.recipeImage || null;
  if(plantDraftRecipeFile){
    recipeImage = await uploadSeedFile(plantDraftRecipeFile, `plant-${plantId}-recipe`).catch(err => {
      console.warn("recipe image upload failed, falling back to a local-only blob URL:", err);

    x: pendingPlantPos.x, y: pendingPlantPos.y, pinned: existing?.pinned || false,
  };

  plantSlotsChannel?.setData(draft => { draft[plantId] = plant; });
  renderPlantSlots();
  hidePlantModal();
  pSaveBtn.disabled = false; pSaveBtn.textContent = "plant";

/* planting is only allowed on a hot spot — a fixed grid spread evenly across
   the field, unrelated to the decorative seed markers (those are clickable
   some other way, not this). A spot with a plant in it already is excluded,
   so hovering/clicking an existing plant never offers it as a target. */
const HOTSPOT_COLS = 15, HOTSPOT_ROWS = 8, HOTSPOT_MARGIN = 150;
function hotSpotPositions(){
  const usableW = FIELD_W - HOTSPOT_MARGIN * 2, usableH = FIELD_H - HOTSPOT_MARGIN * 2;
  const spots = [];
  for(let row = 0; row < HOTSPOT_ROWS; row++){
    for(let col = 0; col < HOTSPOT_COLS; col++){
      spots.push({
        x: HOTSPOT_MARGIN + (usableW * col) / (HOTSPOT_COLS - 1),
        y: HOTSPOT_MARGIN + (usableH * row) / (HOTSPOT_ROWS - 1),
      });
    }
  }
  return spots;
}

// half of the hover square's 140x140 footprint (matches .hoversquare/
// .plantmark/pCanvas) — a square hit test, not a circular radius, so the
// square appears/disappears exactly at its own visible edge, not some
// smaller invisible area inside it.
const HOTSPOT_HALF = 70;
/* a plant's *actual* rendered box (drawing + its name label, which sits to
   the right and can extend well past the 140px drawing itself for a longer
   name) — measured live rather than assumed, so the protected area always
   matches what's really on screen no matter how long the name is. Using a
   fixed 140x140 box here undercounted that overflow and let a "plant here"
   square appear right on top of a longer label — this is what fixes it. */
function occupiedBoxes(){
  const fieldRect = fieldEl.getBoundingClientRect();
  return Array.from(document.querySelectorAll("#plantSlots .plantmark")).map(m => {
    // .plantmark's own rect stops at 140x140 even though its name label is
    // an absolutely-positioned child sitting outside that box (to the
    // right) — an overflowing absolutely-positioned child never enlarges
    // its ancestor's own bounding rect, so the label has to be measured
    // separately and unioned in, or a long name's overflow goes unprotected
    const markRect = m.getBoundingClientRect();
    const txtEl = m.querySelector(".txt");
    const txtRect = txtEl ? txtEl.getBoundingClientRect() : markRect;
    const left = Math.min(markRect.left, txtRect.left), right = Math.max(markRect.right, txtRect.right);
    const top = Math.min(markRect.top, txtRect.top), bottom = Math.max(markRect.bottom, txtRect.bottom);
    return {
      left: left - fieldRect.left, right: right - fieldRect.left,
      top: top - fieldRect.top, bottom: bottom - fieldRect.top,
    };
  });
}
function nearestHotSpot(x, y){
  const boxes = occupiedBoxes();
  let best = null, bestDist = Infinity;
  for(const s of hotSpotPositions()){
    // a hot spot inside an existing plant's real rendered box (drawing +
    // label) is never offered — being near a plant means dragging it, not
    // planting a new one on top of it
    if(boxes.some(b => s.x >= b.left && s.x <= b.right && s.y >= b.top && s.y <= b.bottom)) continue;
    if(Math.abs(x - s.x) > HOTSPOT_HALF || Math.abs(y - s.y) > HOTSPOT_HALF) continue;
    const d = Math.hypot(x - s.x, y - s.y);
    if(d < bestDist){ bestDist = d; best = s; }
  }
  return best;
}

fieldEl.addEventListener("mousemove", e => {
  const r = fieldEl.getBoundingClientRect();
  const spot = nearestHotSpot(e.clientX - r.left, e.clientY - r.top);
  if(!spot){ hoverSquare.style.display = "none"; return; }
  hoverSquare.style.left = spot.x + "px";
  hoverSquare.style.top = spot.y + "px";
  hoverSquare.style.borderColor = garden.meta.colors.seed;
  hoverSquare.style.display = "block";
});
fieldEl.addEventListener("mouseleave", () => { hoverSquare.style.display = "none"; });
fieldEl.addEventListener("click", e => {
  const r = fieldEl.getBoundingClientRect();
  const spot = nearestHotSpot(e.clientX - r.left, e.clientY - r.top);
  if(!spot) return;   // clicking away from a hot spot does nothing now
  openPlantModal(spot);
});

// connectChannels() runs async (after playhtml.init resolves) and re-renders
// on its own once the real synced data arrives — these are just the
// unsynced first paint using local defaults.
renderSeedSlots();
renderPlantSlots();
renderSeedList();
renderSampledFromBank();
</script>
