name = "sound-garden-uploads"
main = "worker.js"
compatibility_date = "2026-01-01"

[[r2_buckets]]
binding = "SEEDS"
bucket_name = "cuttings-loops"

# atomic counter for "new garden" ids — see ensureCounterTable/
# handleNextGardenId in worker.js. Durable Objects would also work but
# require Workers Paid; D1 gives the same single-writer atomicity for
# free. database_id comes from the D1 database's own dashboard page
# after creating it under Storage & Databases → D1 — no manual schema
# setup needed, the worker creates its own table on first use.
[[d1_databases]]
binding = "GARDEN_DB"
database_name = "sound-garden-counter"
database_id = "REPLACE-ME"

[vars]
# after creating the bucket, enable "Public Access" (r2.dev subdomain, or a
# custom domain) in the Cloudflare dashboard and paste that base URL here —
# it's what makes uploaded files downloadable by anyone with the link.
PUBLIC_BUCKET_URL = "https://REPLACE-ME.r2.dev"

# lock this to your real site's origin once you know it (e.g. the URL this
# HTML ends up hosted at) — "*" is fine while you're testing locally.
ALLOWED_ORIGIN = "*"
